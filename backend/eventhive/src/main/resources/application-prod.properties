# ============================================================
# EventHive — Production (Render + Supabase PostgreSQL)
# ============================================================

# ─── Server ───
# Render injects PORT env var
server.port=${PORT:8080}

# ─── Database (Supabase Transaction Pooler) ───
# These come from Render env vars (set in the dashboard)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP (connection pool) ───
# Transaction Pooler shares connections, so keep HikariCP small
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ─── JPA / Hibernate (PostgreSQL) ───
# OVERRIDES the MySQLDialect from the base file
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CRITICAL for Supabase Transaction Pooler:
# Disable prepared statement caching at the JDBC level.
# PgBouncer in transaction mode doesn't preserve prepared
# statements across queries.
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ─── OAuth2 secrets ───
# OVERRIDES the local fallbacks; Render will inject real values
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ─── Frontend URL (production) ───
# OVERRIDES the localhost value from the base file
app.frontend-url=${FRONTEND_URL}

# ─── Logging (quieter in prod) ───
logging.level.root=INFO
logging.level.edu.cit.resuera.eventhive=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN