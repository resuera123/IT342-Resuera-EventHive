# ============================================================
# EventHive — Production (Render + Supabase PostgreSQL)
# Place at: backend/src/main/resources/application-prod.properties
# Activated by setting SPRING_PROFILES_ACTIVE=prod on Render
# ============================================================

# ─── Server ───
server.port=${PORT:8080}

# ─── Database (Supabase Transaction Pooler) ───
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ─── HikariCP (connection pool) ───
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.max-lifetime=1800000

# ─── JPA / Hibernate (PostgreSQL) ───
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# CRITICAL for Supabase Transaction Pooler:
spring.datasource.hikari.data-source-properties.prepareThreshold=0

# ─── OAuth2 secrets ───
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# ─── Frontend URL (production) ───
app.frontend-url=${FRONTEND_URL}

# ─── Session Cookie (cross-site between frontend and backend) ───
server.servlet.session.cookie.same-site=None
server.servlet.session.cookie.secure=true

# ─── Supabase Storage ───
# Service-role key bypasses RLS. Production-only; must be kept out of git.
supabase.url=${SUPABASE_URL}
supabase.service-key=${SUPABASE_SERVICE_KEY}
supabase.bucket.events=${SUPABASE_BUCKET_EVENTS:event-images}
supabase.bucket.profiles=${SUPABASE_BUCKET_PROFILES:profile-pics}

# ─── Logging (quieter in prod) ───
logging.level.root=INFO
logging.level.edu.cit.resuera.eventhive=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.security=WARN