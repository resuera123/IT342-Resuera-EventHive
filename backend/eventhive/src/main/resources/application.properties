# ============================================================
# EventHive — Local Development (MySQL)
# Place at: backend/src/main/resources/application.properties
# Used by default when no SPRING_PROFILES_ACTIVE is set
# ============================================================

spring.application.name=eventhive

# ─── Database (Local MySQL) ───
spring.datasource.url=jdbc:mysql://localhost:3306/eventhivedb?serverTimezone=Asia/Manila
spring.datasource.username=root
spring.datasource.password=${LOCAL_DB_PASSWORD:CHANGE_ME}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ─── Server ───
server.port=8081

# ─── Google OAuth2 ───
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:CHANGE_ME}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:CHANGE_ME}
spring.security.oauth2.client.registration.google.scope=email,profile

spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# ─── File uploads (request size only - storage is now Supabase) ───
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ─── Timezone (Cebu/Manila) ───
spring.jackson.time-zone=Asia/Manila
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Manila
spring.jackson.serialization.write-dates-as-timestamps=false

# ─── Frontend URL (for CORS in SecurityConfig) ───
app.frontend-url=http://localhost:5173

# ─── Supabase Storage ───
# Both local dev AND production now upload images to Supabase Storage.
# Set these in your local .env file and load via VS Code launch config.
supabase.url=${SUPABASE_URL:}
supabase.service-key=${SUPABASE_SERVICE_KEY:}
supabase.bucket.events=${SUPABASE_BUCKET_EVENTS:event-images}
supabase.bucket.profiles=${SUPABASE_BUCKET_PROFILES:profile-pics}