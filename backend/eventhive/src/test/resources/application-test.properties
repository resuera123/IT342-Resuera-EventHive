# ============================================================
# EventHive — Test Profile (used during mvn test)
# Place at: backend/eventhive/src/test/resources/application-test.properties
# ============================================================

# Use H2 in-memory database for all tests
spring.datasource.url=jdbc:h2:mem:eventhivetestdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Stub Supabase config so SupabaseStorageService bean wires correctly
supabase.url=https://test.supabase.co
supabase.service-key=test-key
supabase.bucket.events=event-images
supabase.bucket.profiles=profile-pics

# ─── Google OAuth2 stubs ───
# Required because SecurityConfig.filterChain() calls .oauth2Login(),
# which needs a ClientRegistrationRepository bean. Spring auto-configures
# this bean when at least one provider has client-id and client-secret set.
spring.security.oauth2.client.registration.google.client-id=test-client-id
spring.security.oauth2.client.registration.google.client-secret=test-client-secret
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.provider.google.authorization-uri=https://accounts.google.com/o/oauth2/v2/auth
spring.security.oauth2.client.provider.google.token-uri=https://oauth2.googleapis.com/token
spring.security.oauth2.client.provider.google.user-info-uri=https://www.googleapis.com/oauth2/v3/userinfo
spring.security.oauth2.client.provider.google.user-name-attribute=sub

# Frontend URL for SecurityConfig
app.frontend-url=http://localhost:5173

# Keep test logs quiet
logging.level.root=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.springframework.web=WARN